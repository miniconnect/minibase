description: This is a sample test suite
datasetResource: sample-dataset.yaml
initQueries:
  - "USE db"
cases:
  - name: case-1
    description: This is a test case
    query: "SELECT id, label FROM tbl_1 LIMIT 1"
    columns:
      - type: java.lang.String
      - name: label
        type: java.lang.String
        nullable: true
    # comparison settigns
    expectedResult:
      - [ 1, "xyz"]
  - name: case-2
    description: This is another test case
    initQueries:
      - "INSERT INTO tbl_1(id, label) VALUES(1, 'Hello')"
      - "INSERT INTO tbl_2(id, name) VALUES(99, 'Lorem Ipsum')"
    query: "SELECT id FROM tbl_2 LIMIT 10"
    columns:
      - name: id
        type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
    # comparison settigns
    expectedResult:
      - [ 1, "lorem"]
      - [ 2, "ipsum"]
      - [ 99, "dolor"]
