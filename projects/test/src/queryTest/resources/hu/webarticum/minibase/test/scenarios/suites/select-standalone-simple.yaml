description: Simple standalone select queries
datasetResource: ../datasets/empty.yaml
cases:
  - name: single-constant
    description: Select single constant
    query: "SELECT 1"
    columns:
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
    expectedResult:
      - [ 1 ]
  - name: single-constant-aliased
    description: Select single constant with alias
    query: "SELECT 100 AS hundred"
    columns:
      - name: hundred
        type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
    expectedResult:
      - [ 100 ]
  - name: multiple-constants
    description: Select constants in several ways
    query: "SELECT 10, 20 AS twenty, 30, 40, 50 fifty, '60' as `sixty`, null `70`, 80"
    columns:
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - name: twenty
        type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - name: fifty
        type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - name: sixty
        type: java.lang.String
        nullable: false
      - name: "70"
        type: java.lang.Void
        nullable: true
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
    expectedResult:
      - [ 10, 20, 30, 40, 50, "60", null, 80 ]
