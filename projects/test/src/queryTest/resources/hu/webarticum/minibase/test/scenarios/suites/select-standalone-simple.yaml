description: Simple standalone select queries
datasetResource: ../datasets/empty.yaml
cases:
  - name: single-constant
    description: Select single constant
    query: "SELECT 1"
    columns:
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
    expectedResult:
      - [ 1 ]
  - name: single-constant-aliased
    description: Select single constant with alias
    query: "SELECT 100 AS hundred"
    columns:
      - name: hundred
        type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
    expectedResult:
      - [ 100 ]
  - name: multiple-constants
    description: Select constants in several ways
    query: "SELECT 10, 20 AS twenty, 30, 40, 50 fifty, '60' as `sixty`, null `70`, 80"
    columns:
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - name: twenty
        type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - name: fifty
        type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - name: sixty
        type: java.lang.String
        nullable: false
      - name: "70"
        type: java.lang.Void
        nullable: true
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
    expectedResult:
      - [ 10, 20, 30, 40, 50, "60", null, 80 ]
  - name: simple-math
    description: Simple mathematical operations
    query: "SELECT 1 + 1, 0.7 + 0.3, 8 / 2, 5 / 2, 5.0 / 2, 3 * -7, 2 - 4, -1 - -12"
    columns:
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: java.math.BigDecimal
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: java.math.BigDecimal
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
    expectedResult:
      - [ 2, "1.0", 4, 2, "2.5", -21, -2, 11 ]
  - name: casts
    description: Obvious casts between basic types
    query: "SELECT 7::NUMERIC, CAST('12' AS INT), 32::CHAR, '4.3'::NUMERIC::INT::CHAR, null::INT, 5::DECIMAL(3, 2)"
    columns:
      - type: java.math.BigDecimal
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: java.lang.String
        nullable: false
      - type: java.lang.String
        nullable: false
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: true
      - type: java.math.BigDecimal
        nullable: false
    expectedResult:
      - [ "7", 12, "32", "4", null, "5.00" ]
  - name: null-handling
    description: Simple tests checking null behaviour
    initQueries:
      - "SET @var1 = NULL"
      - "SET @var2 = 'lorem'"
      - "SET @var3 = NULL"
    query: |
      SELECT
        NULL, COALESCE(2, NULL, 3), COALESCE(NULL), COALESCE(@var0, @var1, @var2, @var3),
        NULLIF(@var2, 'lorem'), NULLIF(@var2, 'ipsum'),
        4 + NULL, NULL - NULL, 'lorem' || NULL, NULL || NULL
    columns:
      - type: java.lang.Void
        nullable: true
      - type: hu.webarticum.miniconnect.lang.LargeInteger
        nullable: false
      - type: java.lang.Void
        nullable: true
      - type: java.lang.String
        nullable: false
      - type: java.lang.Void
        nullable: true
      - type: java.lang.String
        nullable: true
      - type: java.lang.Void
        nullable: true
      - type: java.lang.Void
        nullable: true
      - type: java.lang.Void
        nullable: true
      - type: java.lang.Void
        nullable: true
    expectedResult:
      - [ null, 2, null, "lorem", null, "lorem", null, null, null, null ]
